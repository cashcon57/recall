services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: recall
      POSTGRES_USER: recall
      POSTGRES_PASSWORD: recall
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recall"]
      interval: 5s
      timeout: 5s
      retries: 10

  recall:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      PG_HOST: postgres
      PG_DB: recall
      PG_USER: recall
      PG_PASSWORD: recall
      MEMORY_API_KEY: ${MEMORY_API_KEY:-change-me}
      PORT: "8788"
    ports:
      - "8788:8788"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8788/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
